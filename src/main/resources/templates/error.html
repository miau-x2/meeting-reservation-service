<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/assets/css/error.css}">
</head>
<body>
<main class="error-page container d-flex align-items-center justify-content-center">
    <section class="error-card text-center shadow-sm">
        <div class="error-code" th:text="${status != null ? status : 500}">500</div>
        <p class="error-message mb-2" th:switch="${status}">
            <span th:case="401">인증이 필요합니다.</span>
            <span th:case="403">접근 권한이 없습니다.</span>
            <span th:case="404">요청한 페이지를 찾을 수 없습니다.</span>
            <span th:case="*">요청을 처리하는 중 오류가 발생했습니다.</span>
        </p>
        <p class="text-body-secondary small mb-4"
           th:text="${message != null and !#strings.isEmpty(message) ? message : '잠시 후 다시 시도해주세요.'}">
            잠시 후 다시 시도해주세요.
        </p>
        <a class="btn btn-dark" th:href="@{/}">홈으로 이동</a>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
