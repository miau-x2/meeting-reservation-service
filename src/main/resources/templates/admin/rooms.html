<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회의실 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/css/admin-rooms.css}">
</head>
<body class="admin-rooms-page"
      th:attr="data-open-add-modal=${openAddModal},data-open-edit-modal=${openEditModal},data-editing-room-id=${editingRoomId}">
<main class="container py-5">
    <section class="page-hero mb-4">
        <div class="d-flex flex-wrap justify-content-between gap-3 align-items-end">
            <div>
                <p class="page-kicker mb-2">Admin / Rooms</p>
                <h1 class="display-6 mb-2">회의실 관리</h1>
                <p class="text-secondary mb-0">활성, 비활성 여부와 관계없이 모든 회의실을 조회하고 수정할 수 있습니다.</p>
            </div>
            <div class="d-flex gap-2">
                <a class="btn btn-outline-dark" th:href="@{/admin/dashboard}">대시보드</a>
                <button type="button" class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#addRoomModal">
                    <i class="bi bi-plus-lg me-1"></i>회의실 추가
                </button>
            </div>
        </div>
    </section>

    <div th:if="${roomSuccessMessage != null}" class="alert alert-success py-2" role="alert" th:text="${roomSuccessMessage}"></div>

    <section class="panel-card">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
            <div>
                <h2 class="h5 mb-1">전체 회의실 목록</h2>
                <p class="text-secondary mb-0" th:text="|총 ${roomsPage.totalElements}개의 회의실|">총 0개의 회의실</p>
            </div>
            <form method="get" th:action="@{/admin/rooms}" class="d-flex flex-wrap align-items-center gap-2">
                <label for="floorFilter" class="form-label mb-0 text-secondary floor-filter-select-form-label">층수</label>
                <select id="floorFilter" name="floor" class="form-select form-select-sm floor-filter-select">
                    <option value="" th:selected="${selectedFloor == null}">전체보기</option>
                    <option th:each="floorNumber : ${#numbers.sequence(1, 10)}"
                            th:value="${floorNumber}"
                            th:text="|${floorNumber}층|"
                            th:selected="${selectedFloor == floorNumber}">
                        1층
                    </option>
                </select>
                <label for="activeFilter" class="form-label mb-0 text-secondary floor-filter-select-form-label">상태</label>
                <select id="activeFilter" name="active" class="form-select form-select-sm floor-filter-select">
                    <option value="" th:selected="${selectedActive == null}">전체</option>
                    <option value="true" th:selected="${selectedActive == true}">활성</option>
                    <option value="false" th:selected="${selectedActive == false}">비활성</option>
                </select>
                <input type="hidden" name="page" value="1">
                <input type="hidden" name="size" th:value="${roomsPage.size}">
            </form>
        </div>

        <div class="table-responsive" th:if="${!#lists.isEmpty(roomsPage.content)}">
            <table class="table align-middle admin-rooms-table">
                <thead>
                <tr>
                    <th scope="col">회의실 이름</th>
                    <th scope="col">층수</th>
                    <th scope="col">수용 인원</th>
                    <th scope="col" class="text-end">관리</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="room : ${roomsPage.content}">
                    <td>
                        <div class="fw-semibold" th:text="${room.name}">Orion</div>
                        <div class="d-flex gap-2 align-items-center mt-1">
                            <span class="badge rounded-pill"
                                  th:classappend="${room.active} ? ' text-bg-success-subtle room-badge-active' : ' text-bg-secondary-subtle room-badge-inactive'"
                                  th:text="${room.active} ? '활성' : '비활성'">활성</span>
                            <span class="text-secondary small text-truncate" th:text="${room.description}">설명</span>
                        </div>
                    </td>
                    <td th:text="|${room.floor}층|">8층</td>
                    <td th:text="|${room.capacity}명|">12명</td>
                    <td class="text-end">
                        <div class="d-inline-flex gap-2">
                            <button type="button"
                                    class="btn btn-outline-warning btn-sm edit-room-btn"
                                    data-bs-toggle="modal"
                                    data-bs-target="#editRoomModal"
                                    th:attr="data-room-id=${room.id},data-room-name=${room.name},data-room-floor=${room.floor},data-room-capacity=${room.capacity},data-room-description=${room.description},data-room-active=${room.active}">
                                수정
                            </button>
                            <form method="post"
                                  th:action="@{/admin/rooms/{id}/active(id=${room.id})}"
                                  class="d-inline-flex">
                                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="page" th:value="${roomsPage.page}">
                                <input type="hidden" name="size" th:value="${roomsPage.size}">
                                <input type="hidden" name="floor" th:if="${selectedFloor != null}" th:value="${selectedFloor}">
                                <input type="hidden" name="active" th:if="${selectedActive != null}" th:value="${selectedActive}">
                                <input type="hidden" name="nextActive" th:value="${!room.active}">
                                <button type="submit" class="btn btn-outline-danger btn-sm">
                                    <span th:text="${room.active} ? '비활성' : '활성'">활성</span>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="empty-panel" th:if="${#lists.isEmpty(roomsPage.content)}">
            <i class="bi bi-building"></i>
            <h3 class="h5 mt-3">조건에 맞는 회의실이 없습니다.</h3>
            <p class="text-secondary mb-0">선택한 층수와 상태에 맞는 회의실이 없으면 필터를 초기화해서 다시 확인해 보세요.</p>
        </div>

        <nav class="mt-4"
             data-pagination
             data-base-url="/admin/rooms"
             th:attr="data-current-page=${roomsPage.page},data-page-size=${roomsPage.size},data-total-pages=${roomsPage.totalPages},data-floor=${selectedFloor},data-active=${selectedActive}">
        </nav>
    </section>
</main>

<div class="modal fade" id="addRoomModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form id="addRoomForm"
                  th:action="@{/admin/rooms}"
                  th:object="${addRoomFormData}"
                  method="post"
                  novalidate>
                <div class="modal-header">
                    <h2 class="modal-title h5 mb-0">회의실 추가</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="page" th:value="${roomsPage.page}">
                    <input type="hidden" name="size" th:value="${roomsPage.size}">
                    <input type="hidden" name="floor" th:if="${selectedFloor != null}" th:value="${selectedFloor}">
                    <input type="hidden" name="active" th:if="${selectedActive != null}" th:value="${selectedActive}">

                    <div class="alert alert-danger py-2"
                         th:if="${#fields.hasGlobalErrors()}"
                         th:text="${#fields.globalErrors()[0]}">
                    </div>

                    <div class="mb-3">
                        <label for="addName" class="form-label">회의실 이름</label>
                        <input id="addName" type="text" class="form-control" th:field="*{name}" th:classappend="${#fields.hasErrors('name')} ? ' is-invalid' : ''">
                        <div id="addNameFeedback" class="field-feedback"></div>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:text="${#fields.errors('name')[0]}"></div>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="addFloor" class="form-label">층수</label>
                            <input id="addFloor" type="number" class="form-control" th:field="*{floor}" min="1" max="10" th:classappend="${#fields.hasErrors('floor')} ? ' is-invalid' : ''">
                            <div id="addFloorFeedback" class="field-feedback"></div>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('floor')}" th:text="${#fields.errors('floor')[0]}"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="addCapacity" class="form-label">수용 인원</label>
                            <input id="addCapacity" type="number" class="form-control" th:field="*{capacity}" min="1" max="255" th:classappend="${#fields.hasErrors('capacity')} ? ' is-invalid' : ''">
                            <div id="addCapacityFeedback" class="field-feedback"></div>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('capacity')}" th:text="${#fields.errors('capacity')[0]}"></div>
                        </div>
                    </div>
                    <div class="mt-3">
                        <label for="addDescription" class="form-label">설명</label>
                        <textarea id="addDescription" class="form-control" th:field="*{description}" rows="3" th:classappend="${#fields.hasErrors('description')} ? ' is-invalid' : ''"></textarea>
                        <div id="addDescriptionFeedback" class="field-feedback"></div>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:text="${#fields.errors('description')[0]}"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">취소</button>
                    <button id="addRoomSubmitButton" type="submit" class="btn btn-primary" disabled>추가</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="editRoomModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form id="editRoomForm"
                  th:action="${editingRoomId != null ? '/admin/rooms/' + editingRoomId : '/admin/rooms/0'}"
                  th:object="${updateRoomFormData}"
                  method="post"
                  novalidate>
                <div class="modal-header">
                    <h2 class="modal-title h5 mb-0">회의실 수정</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="page" th:value="${roomsPage.page}">
                    <input type="hidden" name="size" th:value="${roomsPage.size}">
                    <input type="hidden" name="floor" th:if="${selectedFloor != null}" th:value="${selectedFloor}">
                    <input type="hidden" name="active" th:if="${selectedActive != null}" th:value="${selectedActive}">

                    <div class="mb-3">
                        <label for="editName" class="form-label">회의실 이름</label>
                        <input id="editName" type="text" class="form-control" th:field="*{name}" th:classappend="${#fields.hasErrors('name')} ? ' is-invalid' : ''">
                        <div id="editNameFeedback" class="field-feedback"></div>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:text="${#fields.errors('name')[0]}"></div>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="editFloor" class="form-label">층수</label>
                            <input id="editFloor" type="number" class="form-control" th:field="*{floor}" min="1" max="10" th:classappend="${#fields.hasErrors('floor')} ? ' is-invalid' : ''">
                            <div id="editFloorFeedback" class="field-feedback"></div>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('floor')}" th:text="${#fields.errors('floor')[0]}"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="editCapacity" class="form-label">수용 인원</label>
                            <input id="editCapacity" type="number" class="form-control" th:field="*{capacity}" min="1" max="255" th:classappend="${#fields.hasErrors('capacity')} ? ' is-invalid' : ''">
                            <div id="editCapacityFeedback" class="field-feedback"></div>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('capacity')}" th:text="${#fields.errors('capacity')[0]}"></div>
                        </div>
                    </div>
                    <div class="mt-3">
                        <label for="editDescription" class="form-label">설명</label>
                        <textarea id="editDescription" class="form-control" th:field="*{description}" rows="3" th:classappend="${#fields.hasErrors('description')} ? ' is-invalid' : ''"></textarea>
                        <div id="editDescriptionFeedback" class="field-feedback"></div>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:text="${#fields.errors('description')[0]}"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">취소</button>
                    <button id="editRoomSubmitButton" type="submit" class="btn btn-warning" disabled>수정</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script th:src="@{/assets/js/admin-rooms.js}" defer></script>
</body>
</html>
