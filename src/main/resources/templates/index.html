<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meeting Reservation Service</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/css/index.css}">
</head>
<body class="landing-page">
<main>
    <section class="hero-section">
        <div class="container py-5">
            <div class="row align-items-center g-4">
                <div class="col-lg-6">
                    <p class="hero-kicker mb-3">Meeting Reservation Service</p>
                    <h1 class="display-5 fw-semibold mb-3">회의실 예약을 빠르고 명확하게 관리하세요.</h1>

                    <div class="d-flex flex-wrap gap-2 mb-4">
                        <a class="btn btn-outline-secondary btn-lg px-4" sec:authorize="isAnonymous()" th:href="@{/login}">로그인</a>
                        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-secondary btn-lg px-4">로그아웃</button>
                        </form>
                        <a class="btn btn-outline-primary btn-lg px-4" th:href="@{/employees/signup}">회원가입</a>
                        <a class="btn btn-outline-dark btn-lg px-4" href="#features">주요 기능 보기</a>
                    </div>

                    <div class="hero-metrics row">
                        <div class="col-sm">
                            <div class="metric-card">
                                <strong>실시간</strong>
                                <span>회의실 예약 상태 확인</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-6">
                    <section class="showcase-card shadow-sm">
                        <div class="showcase-window">
                            <div class="showcase-window-header">
                                <span></span>
                                <span></span>
                                <span></span>
                            </div>
                            <div class="showcase-panel">
                                <div class="showcase-title-row">
                                    <div>
                                        <p class="showcase-label mb-1">오늘의 예약 현황</p>
                                        <h2 class="h4 mb-0">8층 Orion 회의실</h2>
                                    </div>
                                    <span class="badge text-bg-success-subtle status-badge">예약 가능</span>
                                </div>

                                <div class="timeline-list mt-4">
                                    <div class="timeline-item active">
                                        <span class="timeline-time">09:30</span>
                                        <div>
                                            <strong>프로젝트 회의</strong>
                                            <p class="mb-0">개발팀 주간 40분</p>
                                        </div>
                                    </div>
                                    <div class="timeline-item">
                                        <span class="timeline-time">11:00</span>
                                        <div>
                                            <strong>디자인 리뷰</strong>
                                            <p class="mb-0">프로덕트 주간 30분</p>
                                        </div>
                                    </div>
                                    <div class="timeline-item">
                                        <span class="timeline-time">14:00</span>
                                        <div>
                                            <strong>주간 운영 회의</strong>
                                            <p class="mb-0">운영팀 주간 1시간</p>
                                        </div>
                                    </div>
                                </div>

                                <div class="showcase-footer mt-4">
                                    <i class="bi bi-calendar2-week"></i>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </section>

    <section id="features" class="content-section">
        <div class="container py-5">
            <div class="section-heading text-center mb-5">
                <p class="hero-kicker mb-2">Core Features</p>
            </div>

            <div class="row g-4">
                <div class="col-md-4">
                    <article class="feature-card h-100">
                        <div class="feature-icon"><i class="bi bi-calendar-check"></i></div>
                        <h3 class="h5">회의실 예약</h3>
                    </article>
                </div>
                <div class="col-md-4">
                    <article class="feature-card h-100">
                        <div class="feature-icon"><i class="bi bi-building-check"></i></div>
                        <h3 class="h5">회의실 조회</h3>
                    </article>
                </div>
                <div class="col-md-4">
                    <article class="feature-card h-100">
                        <div class="feature-icon"><i class="bi bi-people"></i></div>
                        <h3 class="h5">예약 내역 확인</h3>
                    </article>
                </div>
                <div class="col-md-4" sec:authorize="hasRole('ADMIN')">
                    <a class="feature-card-link" th:href="@{/admin/dashboard}">
                        <article class="feature-card h-100">
                            <div class="feature-icon"><i class="bi bi-gear-wide-connected"></i></div>
                            <h3 class="h5">관리자 대시보드</h3>
                        </article>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <section class="content-section content-section-soft">
        <div class="container py-5">
            <div class="cta-panel">
                <div>
                    <p class="hero-kicker mb-2">Start Now</p>
                </div>
            </div>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
