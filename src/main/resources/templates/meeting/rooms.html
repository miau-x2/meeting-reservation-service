<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회의실 조회</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/css/meeting-rooms.css}">
</head>
<body class="meeting-rooms-page">
<main class="container py-5">
    <section class="page-hero mb-4">
        <div class="d-flex flex-wrap justify-content-between gap-3 align-items-end">
            <div>
                <p class="page-kicker mb-2">Meeting Rooms</p>
                <h1 class="display-6 mb-2">회의실 조회</h1>
                <p class="text-secondary mb-0">현재 예약 가능한 회의실을 층수별로 확인할 수 있는 화면입니다.</p>
            </div>
            <div class="d-flex gap-2">
                <a class="btn btn-outline-dark" th:href="@{/}">메인으로</a>
            </div>
        </div>
    </section>

    <section class="panel-card">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div>
                <h2 class="h5 mb-1">회의실 목록</h2>
                <p class="text-secondary mb-0" th:text="|총 ${roomsPage.totalElements}개의 회의실|">총 0개의 회의실</p>
            </div>
            <form method="get" th:action="@{/rooms}" class="d-flex align-items-center gap-2">
                <label for="floorFilter" class="form-label mb-0 text-secondary floor-filter-select-form-label">층수</label>
                <select id="floorFilter" name="floor" class="form-select form-select-sm floor-filter-select">
                    <option value="" th:selected="${selectedFloor == null}">전체보기</option>
                    <option th:each="floorNumber : ${#numbers.sequence(1, 10)}"
                            th:value="${floorNumber}"
                            th:text="|${floorNumber}층|"
                            th:selected="${selectedFloor == floorNumber}">
                        1층
                    </option>
                </select>
                <input type="hidden" name="page" value="1">
                <input type="hidden" name="size" th:value="${roomsPage.size}">
            </form>
        </div>

        <div class="row g-4" th:if="${!#lists.isEmpty(roomsPage.content)}">
            <div class="col-md-6 col-xl-room-5" th:each="room : ${roomsPage.content}">
                <article class="room-card h-100">
                    <div class="room-card-header">
                        <div>
                            <p class="room-floor mb-1" th:text="|${room.floor}층|">8층</p>
                            <h3 class="h4 mb-0" th:text="${room.name}">Orion</h3>
                        </div>
                        <i class="bi bi-door-open room-icon"></i>
                    </div>
                    <p class="room-description mt-3 mb-4" th:text="${room.description}">회의실 설명</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="badge rounded-pill text-bg-primary-subtle room-capacity" th:text="|수용인원 ${room.capacity}명|">수용인원 8명</span>
                    </div>
                </article>
            </div>
        </div>

        <div class="empty-panel" th:if="${#lists.isEmpty(roomsPage.content)}">
            <i class="bi bi-building"></i>
            <h3 class="h5 mt-3">활성 회의실이 없습니다.</h3>
            <p class="text-secondary mb-0">선택한 층에 활성 회의실이 없으면 다른 층이나 전체보기로 다시 확인해 보세요.</p>
        </div>

        <nav class="mt-4"
             data-pagination
             data-base-url="/rooms"
             th:attr="data-current-page=${roomsPage.page},data-page-size=${roomsPage.size},data-total-pages=${roomsPage.totalPages},data-floor=${selectedFloor}">
        </nav>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script th:src="@{/assets/js/meeting-rooms.js}" defer></script>
</body>
</html>
