<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>로그인</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/assets/css/login.css}" rel="stylesheet">
</head>

<body class="login-page">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="card shadow-sm login-card border-0">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <p class="login-kicker mb-2">Meeting Reservation Service</p>
                        <h1 class="h4 mb-0">로그인</h1>
                    </div>

                    <form id="loginForm"
                          th:action="@{/login}"
                          method="post"
                          novalidate>

                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div id="globalError"
                             class="alert alert-danger py-2"
                             role="alert"
                             th:if="${loginGlobalErrorMessage != null}"
                             th:text="${loginGlobalErrorMessage}">
                        </div>

                        <div class="mb-3">
                            <label for="username" class="form-label">아이디</label>
                            <input id="username"
                                   type="text"
                                   class="form-control"
                                   name="username"
                                   th:value="${username}"
                                   autocomplete="username">
                            <div class="field-feedback"></div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">비밀번호</label>
                            <div class="position-relative">
                                <input id="password"
                                       type="password"
                                       class="form-control pe-5"
                                       th:classappend="${loginFieldErrorMessage != null} ? ' is-invalid' : ''"
                                       name="password"
                                       autocomplete="current-password"
                                       aria-describedby="passwordFeedback">

                                <button id="togglePasswordBtn"
                                        type="button"
                                        class="password-toggle"
                                        aria-label="비밀번호 보기 또는 숨기기"
                                        aria-pressed="false">
                                    <i id="togglePasswordIcon" class="bi bi-eye-slash" aria-hidden="true"></i>
                                </button>
                            </div>

                            <div id="passwordFeedback"
                                 class="field-feedback is-invalid"
                                 th:if="${loginFieldErrorMessage != null}"
                                 th:text="${loginFieldErrorMessage}">
                            </div>
                            <div class="field-feedback" th:if="${loginFieldErrorMessage == null}"></div>
                        </div>

                        <div class="d-grid mt-4">
                            <button id="loginBtn" type="submit" class="btn btn-outline-primary">로그인</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script th:src="@{/assets/js/login.js}" defer></script>
</body>
</html>
