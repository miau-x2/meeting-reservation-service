<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원가입</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/assets/css/signup.css}" rel="stylesheet">
</head>
<body class="signup-page">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <section class="card shadow-sm signup-card border-0">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <h1 class="h3 mb-2">회원가입</h1>
                    </div>

                    <form id="signupForm"
                          th:action="@{/employees/signup}"
                          th:object="${signupFormData}"
                          method="post"
                          novalidate>

                        <div id="globalErrorJs" class="alert alert-danger py-2 mb-3" role="alert" hidden></div>
                        <div id="globalError"
                             class="alert alert-danger py-2 mb-3"
                             role="alert"
                             th:if="${#fields.hasGlobalErrors()}"
                             th:text="${#fields.globalErrors()[0].defaultMessage}">
                        </div>

                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label for="username" class="form-label">아이디</label>
                            <input id="username"
                                   type="text"
                                   class="form-control"
                                   th:field="*{username}"
                                   autocomplete="username"
                                   aria-describedby="usernameFeedback"
                                   th:classappend="${#fields.hasErrors('username')} ? ' is-invalid' : ''">
                            <div id="usernameFeedback"
                                 class="field-feedback"
                                 th:classappend="${#fields.hasErrors('username')} ? ' is-invalid' : ''"
                                 th:text="${#fields.hasErrors('username')} ? ${#fields.errors('username')[0]} : ''">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">비밀번호</label>
                            <div class="position-relative">
                                <input id="password"
                                       type="password"
                                       class="form-control pe-5"
                                       th:field="*{password}"
                                       autocomplete="new-password"
                                       aria-describedby="passwordFeedback"
                                       th:classappend="${#fields.hasErrors('password')} ? ' is-invalid' : ''">
                                <button id="togglePasswordBtn"
                                        type="button"
                                        class="password-toggle"
                                        aria-label="비밀번호 보기 또는 숨기기"
                                        aria-pressed="false">
                                    <i id="togglePasswordIcon" class="bi bi-eye-slash" aria-hidden="true"></i>
                                </button>
                            </div>
                            <div id="passwordFeedback"
                                 class="field-feedback"
                                 th:classappend="${#fields.hasErrors('password')} ? ' is-invalid' : ''"
                                 th:text="${#fields.hasErrors('password')} ? ${#fields.errors('password')[0]} : ''">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="name" class="form-label">이름</label>
                            <input id="name"
                                   type="text"
                                   class="form-control"
                                   th:field="*{name}"
                                   autocomplete="name"
                                   aria-describedby="nameFeedback"
                                   th:classappend="${#fields.hasErrors('name')} ? ' is-invalid' : ''">
                            <div id="nameFeedback"
                                 class="field-feedback"
                                 th:classappend="${#fields.hasErrors('name')} ? ' is-invalid' : ''"
                                 th:text="${#fields.hasErrors('name')} ? ${#fields.errors('name')[0]} : ''">
                            </div>
                        </div>

                        <div class="d-grid">
                            <button id="signupBtn" type="submit" class="btn btn-outline-primary btn-lg">회원가입</button>
                        </div>
                    </form>
                </div>
            </section>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script th:src="@{/assets/js/signup.js}" defer></script>
</body>
</html>
